        .status-doing { background-color: #fffbeb; border-color: #fde68a; border-width: 2px; }
        .status-done { background-color: #f0fdf4; border-color: #bbf7d0; opacity: 0.75; }
        .text-done { text-decoration: line-through; color: #94a3b8; }
        
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12 text-slate-900">

    <div class="max-w-3xl mx-auto px-4 pt-8">
        
        <!-- CABEÇALHO DE PROGRESSO -->
        <header class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-6">
            <div class="bg-slate-900 p-6 text-white text-center">
                <h1 class="text-2xl font-extrabold tracking-tight">M6 UFPE - Cronograma Integral</h1>
                <p class="text-slate-400 text-sm mt-1">Sincronizado com LocalStorage • Turma 155</p>
            </div>
            <div class="p-6">
                <div class="flex justify-between items-end mb-3">
                    <div>
                        <div class="flex items-baseline gap-2">
                            <span id="progress-percent" class="text-4xl font-black text-blue-600">0%</span>
                            <span id="progress-count" class="text-sm font-bold text-slate-400">0/0</span>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Conclusão Total</p>
                    </div>
                    <div class="text-right space-y-1">
                        <div class="flex items-center justify-end gap-2 text-amber-600 font-bold text-xs bg-amber-50 px-2 py-1 rounded-md border border-amber-100">
                            <i data-lucide="clock" class="w-3 h-3"></i> <span id="doing-count">0</span> No Forno
                        </div>
                        <div class="flex items-center justify-end gap-2 text-green-600 font-bold text-xs bg-green-50 px-2 py-1 rounded-md border border-green-100">
                            <i data-lucide="check-circle-2" class="w-3 h-3"></i> <span id="done-count">0</span> Finalizados
                        </div>
                    </div>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden shadow-inner">
                    <div id="progress-bar" class="bg-blue-600 h-full w-0 transition-all duration-700 ease-out"></div>
                </div>
            </div>
        </header>

        <!-- BUSCA E FILTROS -->
        <div class="sticky-header bg-slate-50/90 backdrop-blur-md py-4 space-y-3">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="search-input" placeholder="Pesquisar por assunto ou professor..." 
                    class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm font-medium transition-all">
            </div>
            
            <div id="filter-container" class="flex flex-wrap gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <!-- Botões gerados via JS -->
            </div>
        </div>

        <!-- LISTA DE AULAS -->
        <div id="checklist-container" class="space-y-10 mt-4">
            <!-- Conteúdo gerado via JS -->
        </div>

        <!-- RODAPÉ -->
        <div class="mt-16 text-center border-t border-slate-200 pt-8">
            <button onclick="resetAll()" class="inline-flex items-center gap-2 text-xs font-bold text-red-400 hover:text-red-600 bg-red-50 px-5 py-2.5 rounded-xl transition-all">
                <i data-lucide="refresh-ccw" class="w-3 h-3"></i>
                Limpar todos os dados salvos
            </button>
        </div>
    </div>

            { id: 117, week: 13, date: '27/05', month: 'Maio', subject: 'pato-img', title: 'IMAGEM: Medicina nuclear no câncer de Próstata' },
            { id: 118, week: 13, date: '28/05', month: 'Maio', subject: 'pato-img', title: 'PATOLOGIA: Patologia da Adrenal' },
            { id: 119, week: 13, date: '29/05', month: 'Maio', subject: 'asa2', title: 'ASA 2: UROLOGIA - Incontinência Urinária' },
            { id: 120, week: 13, date: '29/05', month: 'Maio', subject: 'asa3', title: 'ASA 3: GASTRO - Complicações da Cirrose' },
            // SEMANA 14
            { id: 121, week: 14, date: '01/06', month: 'Junho', subject: 'asa4', title: 'ASA 4: ENDOCRINO - Hiperparatireoidismo e Hipoparatireoidismo' },
            { id: 122, week: 14, date: '01/06', month: 'Junho', subject: 'asa2', title: 'ASA 2: NEFRO - Doenças císticas / Nefrite Intersticial' },
            { id: 123, week: 14, date: '02/06', month: 'Junho', subject: 'uped', title: 'UPED: Acidentes com animais peçonhentos' },
            { id: 124, week: 14, date: '02/06', month: 'Junho', subject: 'asa4', title: 'ASA 4: HEMATO - Paciente que sangra 1 - Púrpura' },
            { id: 125, week: 14, date: '03/06', month: 'Junho', subject: 'pato-img', title: 'PATOLOGIA: Patologia das Hepatites e da Cirrose Hepática' },
            { id: 126, week: 14, date: '05/06', month: 'Junho', subject: 'asa2', title: 'ASA 2: UROLOGIA - Disfunção Erétil' },
            // SEMANA 15
            { id: 127, week: 15, date: '08/06', month: 'Junho', subject: 'asa4', title: 'ASA 4: ENDOCRINO - Deficiência de vitamina D e Osteoporose' },
            { id: 128, week: 15, date: '08/06', month: 'Junho', subject: 'asa2', title: 'ASA 2: NEFRO - Hipertensão Secundária' },
            { id: 129, week: 15, date: '09/06', month: 'Junho', subject: 'uped', title: 'UPED: Crises Epilépticas' },
            { id: 130, week: 15, date: '09/06', month: 'Junho', subject: 'asa4', title: 'ASA 4: HEMATO - Coagulopatia Hereditária' },
            { id: 131, week: 15, date: '10/06', month: 'Junho', subject: 'pato-img', title: 'IMAGEM: Sessão de Casos clínicos' },
            { id: 132, week: 15, date: '12/06', month: 'Junho', subject: 'asa2', title: 'ASA 2: UROLOGIA - Câncer de Rim' },
            // SEMANA 16+
            { id: 133, week: 16, date: '16/06', month: 'Junho', subject: 'asa4', title: 'ASA 4: HEMATO - Coagulopatia adquirida' },
            { id: 134, week: 17, date: '22/06', month: 'Junho', subject: 'asa4', title: 'ASA 4: HEMATO - Anemia hemolítica / Esferocitose / Deficiência de G6PD' }
        ];

        let statusMap = JSON.parse(localStorage.getItem('m6_ufpe_v4_status')) || {};
        let currentFilter = 'all';
        let currentSearch = '';

        function renderFilters() {
            const container = document.getElementById('filter-container');
            container.innerHTML = subjects.map(s => `
                <button onclick="setFilter('${s.id}')" 
                    class="px-4 py-2.5 rounded-2xl text-[11px] font-bold border transition-all whitespace-nowrap shadow-sm ${currentFilter === s.id ? s.color + ' ring-2 ring-blue-500 ring-offset-2 scale-105' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}">
                    ${s.name}
                </button>
            `).join('');
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            const filtered = checklistData.filter(item => {
                const matchSubj = currentFilter === 'all' || item.subject === currentFilter;
                const matchSearch = item.title.toLowerCase().includes(currentSearch.toLowerCase());
                return matchSubj && matchSearch;
            });

            const months = [...new Set(filtered.map(i => i.month))];
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-100">
                        <p class="text-slate-400 font-bold">Nenhuma aula encontrada.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = months.map(month => `
                <section>
                    <div class="flex items-center gap-3 mb-6">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] whitespace-nowrap">${month}</h2>
                        <div class="h-px bg-slate-200 w-full"></div>
                    </div>
                    <div class="grid gap-4">
                        ${filtered.filter(i => i.month === month).map(item => {
                            const status = statusMap[item.id] || 0;
                            const subjInfo = subjects.find(s => s.id === item.subject);
                            
                            let statusClass = '';
                            let icon = '<div class="w-8 h-8 border-2 border-slate-200 rounded-full"></div>';
                            let titleClass = 'text-slate-800';

                            if (status === 1) {
                                statusClass = 'status-doing shadow-amber-50';
                                icon = '<div class="bg-amber-500 rounded-full p-2 text-white shadow-lg animate-pulse"><i data-lucide="play" class="w-4 h-4 fill-current"></i></div>';
                            } else if (status === 2) {
                                statusClass = 'status-done';
                                icon = '<div class="bg-green-500 rounded-full p-1.5 text-white shadow-md"><i data-lucide="check" class="w-5 h-5 stroke-[3]"></i></div>';
                                titleClass = 'text-done font-medium';
                            }

                            return `
                                <div onclick="toggleStatus(${item.id})" 
                                    class="group relative flex items-center gap-5 p-5 bg-white border rounded-3xl cursor-pointer transition-all active:scale-95 hover:border-blue-300 hover:shadow-lg ${statusClass} border-slate-200">
                                    <div class="shrink-0 flex items-center justify-center w-8">
                                        ${icon}
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-2">
                                            <span class="text-[9px] uppercase font-black px-2 py-0.5 rounded-md border ${subjInfo.color}">${subjInfo.name}</span>
                                            <span class="text-[9px] font-bold text-slate-400 flex items-center gap-1 bg-slate-50 px-2 py-0.5 rounded-md">
                                                <i data-lucide="calendar" class="w-3 h-3"></i> ${item.date}
                                            </span>
                                            <span class="text-[9px] font-bold text-slate-300 uppercase">Semana ${item.week}</span>
                                        </div>
                                        <h3 class="font-bold text-sm md:text-base leading-snug tracking-tight ${titleClass}">${item.title}</h3>
                                    </div>
                                    <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </section>
            `).join('');
            
            lucide.createIcons();
            updateProgress();
        }

        function toggleStatus(id) {
            let current = statusMap[id] || 0;
            let next = (current + 1) % 3; 
            
            if (next === 0) {
                delete statusMap[id];
            } else {
                statusMap[id] = next;
            }
            
            localStorage.setItem('m6_ufpe_v4_status', JSON.stringify(statusMap));
            renderChecklist();
        }

        function updateProgress() {
            const total = checklistData.length;
            const entries = Object.values(statusMap);
            const done = entries.filter(s => s === 2).length;
            const doing = entries.filter(s => s === 1).length;
            
            const percent = Math.round((done / total) * 100);
            
            // Garantir que os elementos existam antes de setar
            const elPercent = document.getElementById('progress-percent');
            const elDone = document.getElementById('done-count');
            const elDoing = document.getElementById('doing-count');
            const elBar = document.getElementById('progress-bar');
            const elCount = document.getElementById('progress-count');

            if(elPercent) elPercent.innerText = percent + '%';
            if(elDone) elDone.innerText = done;
            if(elDoing) elDoing.innerText = doing;
            if(elBar) elBar.style.width = percent + '%';
            if(elCount) elCount.innerText = `${done} / ${total}`;
        }

        function setFilter(id) {
            currentFilter = id;
            renderFilters();
            renderChecklist();
        }

        function resetAll() {
            if (confirm('Atenção: Você perderá todo o histórico de estudos salvo. Deseja mesmo resetar?')) {
                statusMap = {};
                localStorage.removeItem('m6_ufpe_v4_status');
                renderChecklist();
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderChecklist();
        });

        // Inicialização
        renderFilters();
        renderChecklist();
        lucide.createIcons();
    </script>
</body>
</html>
